<!DOCTYPE html>
<html lang="bn">

        .app-list { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; padding: 50px; }

    </style>
</head>
<body>
    <h1 style="text-align:center;">আমার তৈরি সকল অ্যাপ</h1>
    <div class="app-list">
        <a href="smart-school.html" class="app-item">
            <img src="app_icon.png" alt="Smart School">
            <h3>Smart School</h3>
        </a>
        <a href="another-app.html" class="app-item">
            <img src="icon2.png" alt="Another App">
            <h3>অন্য অ্যাপ</h3>
        </a>

</html>
