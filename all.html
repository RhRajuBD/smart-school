<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bengali Software | অ্যাপ স্টোর</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Hind Siliguri', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        /* Header */
        .header { text-align: center; padding: 60px 20px; background: linear-gradient(135deg, #6366f1, #a855f7); color: white; border-bottom-left-radius: 50px; border-bottom-right-radius: 50px; }
        
        /* App Grid */
        .container { max-width: 1000px; margin: -50px auto 50px; padding: 20px; }
        .app-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .app-card { background: white; padding: 25px; border-radius: 25px; text-align: center; transition: 0.4s; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .app-card:hover { transform: translateY(-10px); box-shadow: 0 20px 30px rgba(99, 102, 241, 0.2); }
        .app-card img { width: 90px; height: 90px; border-radius: 20px; }

        /* Professional Footer */
        .footer { background: #1e293b; color: white; padding: 50px 20px; text-align: center; }
        .social-links { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .social-btn { width: 50px; height: 50px; border-radius: 50%; background: #334155; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: white; text-decoration: none; transition: 0.3s; }
        .social-btn:hover { background: var(--primary); transform: scale(1.1); }
        .dev-info { margin-top: 20px; color: #94a3b8; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Bengali Software</h1>

    </div>

    <div class="container">

            <a href="smart-school.html" class="app-card">

            </div>
    </div>

    <footer class="footer">

        <div class="social-links">

        <div class="dev-info">
