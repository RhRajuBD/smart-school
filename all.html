<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bengali Software | অ্যাপ স্টোর</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Hind Siliguri', sans-serif; background: var(--bg); margin: 0; }
        
        .header { text-align: center; padding: 40px 20px; background: linear-gradient(135deg, #6366f1, #a855f7); color: white; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
        
        .container { max-width: 600px; margin: -20px auto 30px; padding: 15px; }
        
        .app-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .app-card { background: white; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-decoration: none; color: var(--text); }
        .app-card img { width: 60px; height: 60px; border-radius: 15px; }
        .app-card h3 { font-size: 0.9rem; margin: 10px 0 0; }

        .footer { background: #1e293b; color: white; padding: 30px 20px; text-align: center; }
        .social-links { display: flex; justify-content: center; gap: 15px; margin-top: 15px; }
        .social-btn { width: 40px; height: 40px; border-radius: 50%; background: #334155; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Bengali Software</h1>
    </div>

    <div class="container">
        <div class="app-grid">
            <a href="smart-school.html" class="app-card">
                <img src="app_icon.png" alt="Smart School">
                <h3>Smart School</h3>
            </a>
            <a href="app2.html" class="app-card">
                <img src="icon2.png" alt="App 2">
                <h3>অ্যাপের নাম ২</h3>
            </a>
            <a href="app3.html" class="app-card">
                <img src="icon3.png" alt="App 3">
                <h3>অ্যাপের নাম ৩</h3>
            </a>
            <a href="app4.html" class="app-card">
                <img src="icon4.png" alt="App 4">
                <h3>অ্যাপের নাম ৪</h3>
            </a>
            <a href="app5.html" class="app-card">
                <img src="icon5.png" alt="App 5">
                <h3>অ্যাপের নাম ৫</h3>
            </a>
            <a href="app6.html" class="app-card">
                <img src="icon6.png" alt="App 6">
                <h3>অ্যাপের নাম ৬</h3>
            </a>
        </div>
    </div>

    <footer class="footer">
        <p>ডেভেলপারের সাথে যোগাযোগ</p>
        <div class="social-links">
            <a href="#" class="social-btn"><i class="fab fa-facebook-f"></i></a>
            <a href="#" class="social-btn"><i class="fab fa-whatsapp"></i></a>
            <a href="#" class="social-btn"><i class="fas fa-envelope"></i></a>
        </div>
    </footer>

</body>
</html>
